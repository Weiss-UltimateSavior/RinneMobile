name: Build KRKR Save Hook

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/src/main/cpp/**'
      - '.github/workflows/build-krkr-save-hook.yml'

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Build arm64-v8a shared library
        run: |
          mkdir -p build/krkr-save-hook/arm64-v8a
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++ \
            -shared -fPIC -O2 -std=c++17 \
            -Wall -Wextra \
            app/src/main/cpp/krkr_save_hook.cpp \
            -o build/krkr-save-hook/arm64-v8a/libyukihub_krkr_save_hook.so \
            -llog -ldl
          file build/krkr-save-hook/arm64-v8a/libyukihub_krkr_save_hook.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libyukihub_krkr_save_hook-arm64-v8a
          path: build/krkr-save-hook/arm64-v8a/libyukihub_krkr_save_hook.so
